<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创新点 · Daily arXiv AI Enhanced</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data-config.js"></script>
    <script>
        Auth.requireAuth();
    </script>
    <style>
        body { margin: 0; background: #e8eef5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .bar { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .bar a { color: #2563eb; text-decoration: none; font-weight: 600; }
        #err { color: #b91c1c; padding: 16px; display: none; }
        iframe { width: 100%; min-height: calc(100vh - 52px); border: 0; display: block; background: #e8eef5; }
    </style>
</head>
<body>
    <div class="bar">
        <a href="index.html">论文列表</a>
        <span style="color:#94a3b8">/</span>
        <a href="digest-index.html">历史创新点</a>
        <span id="dateLabel" style="color:#64748b;font-size:14px;"></span>
    </div>
    <p id="err"></p>
    <iframe id="frame" title="digest"></iframe>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var date = (params.get('date') || '').trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
                document.getElementById('err').style.display = 'block';
                document.getElementById('err').textContent = '缺少或无效的 date 参数（需 YYYY-MM-DD）。';
                return;
            }
            document.getElementById('dateLabel').textContent = date;

            DATA_CONFIG.inferRepoFromLocation();
            var url = DATA_CONFIG.getDataUrl('digest/' + date + '.html');
            var iframe = document.getElementById('frame');
            var blobUrl = null;

            function revoke() {
                if (blobUrl) {
                    try { URL.revokeObjectURL(blobUrl); } catch (e) {}
                    blobUrl = null;
                }
            }

            fetch(url, { credentials: 'omit' })
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status + '：' + url);
                    return r.text();
                })
                .then(function (html) {
                    revoke();
                    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                    blobUrl = URL.createObjectURL(blob);
                    iframe.src = blobUrl;
                })
                .catch(function (e) {
                    document.getElementById('err').style.display = 'block';
                    document.getElementById('err').textContent = '加载失败：' + (e && e.message ? e.message : String(e));
                });

            window.addEventListener('beforeunload', revoke);
        })();
    </script>
</body>
</html>

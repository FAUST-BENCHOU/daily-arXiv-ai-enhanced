<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史创新点 · Daily arXiv AI Enhanced</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data-config.js"></script>
    <script>
        Auth.requireAuth();
    </script>
    <style>
        body { margin: 0; background: #e8eef5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #334155; }
        .wrap { max-width: 720px; margin: 0 auto; padding: 28px 20px 48px; }
        nav { margin-bottom: 20px; }
        nav a { color: #2563eb; font-weight: 600; text-decoration: none; }
        h1 { color: #0f172a; font-size: 22px; }
        p.sub { color: #64748b; margin-top: 8px; }
        ul { list-style: none; padding: 0; margin-top: 24px; }
        li { margin: 12px 0; }
        li a { color: #2563eb; font-size: 16px; font-weight: 600; text-decoration: none; }
        #err { color: #b91c1c; margin-top: 16px; display: none; }
    </style>
</head>
<body>
    <div class="wrap">
        <nav><a href="index.html">论文列表主页</a></nav>
        <h1>每日硬凑师兄要求的创新点</h1>
        <p class="sub">正文保存在 data 分支；下列链接在本站打开阅读。</p>
        <p id="err"></p>
        <ul id="list"><li style="color:#64748b;">加载中…</li></ul>
    </div>
    <script>
        DATA_CONFIG.inferRepoFromLocation();
        var manifestUrl = DATA_CONFIG.getDataUrl('digest/manifest.json');
        fetch(manifestUrl, { credentials: 'omit' })
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (data) {
                var dates = (data && data.dates) ? data.dates : [];
                var ul = document.getElementById('list');
                ul.innerHTML = '';
                if (!dates.length) {
                    ul.innerHTML = '<li style="color:#64748b;">暂无归档</li>';
                    return;
                }
                dates.forEach(function (d) {
                    var li = document.createElement('li');
                    var a = document.createElement('a');
                    a.href = 'digest-viewer.html?date=' + encodeURIComponent(d);
                    a.textContent = d;
                    li.appendChild(a);
                    ul.appendChild(li);
                });
            })
            .catch(function (e) {
                document.getElementById('err').style.display = 'block';
                document.getElementById('err').textContent = '无法加载 manifest：' + (e && e.message ? e.message : String(e));
                document.getElementById('list').innerHTML = '';
            });
    </script>
</body>
</html>
